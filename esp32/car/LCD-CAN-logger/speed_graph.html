document.getElementById('s-pts').textContent = RAW.length;
const dur = ((RAW[RAW.length-1].t - RAW[0].t)/1000).toFixed(1);
document.getElementById('s-dur').textContent = dur + 's';
const maxSpd = Math.max(...RAW.map(d=>d.speed));
document.getElementById('s-max').textContent = maxSpd.toFixed(2) + ' km/h';

const canvas = document.getElementById('c');
const W = canvas.parentElement.clientWidth - 8;
const H = Math.min(420, Math.round(W * 0.38));
canvas.width = W;
canvas.height = H;

const PAD = {top: 28, right: 20, bottom: 44, left: 58};
const cw = W - PAD.left - PAD.right;
const ch = H - PAD.top - PAD.bottom;

const ctx = canvas.getContext('2d');

const tMin = RAW[0].t, tMax = RAW[RAW.length-1].t;
const sMin = 0, sMax = Math.ceil(maxSpd / 5) * 5 + 5;

function tx(t) { return PAD.left + (t - tMin) / (tMax - tMin) * cw; }
function ty(s) { return PAD.top + ch - (s - sMin) / (sMax - sMin) * ch; }

// background
ctx.fillStyle = '#111';
ctx.fillRect(0, 0, W, H);

// grid
ctx.strokeStyle = '#1e1e1e';
ctx.lineWidth = 1;
for (let s = 0; s <= sMax; s += 5) {
  const y = ty(s);
  ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + cw, y); ctx.stroke();
}
const tSpan = tMax - tMin;
const tStep = tSpan > 300000 ? 60000 : tSpan > 120000 ? 30000 : 10000;
for (let t = Math.ceil(tMin/tStep)*tStep; t <= tMax; t += tStep) {
  const x = tx(t);
  ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + ch); ctx.stroke();
}

// axes
ctx.strokeStyle = '#333';
ctx.lineWidth = 1;
ctx.strokeRect(PAD.left, PAD.top, cw, ch);

// labels
ctx.fillStyle = '#555';
ctx.font = '11px monospace';
ctx.textAlign = 'right';
for (let s = 0; s <= sMax; s += 5) {
  ctx.fillText(s, PAD.left - 6, ty(s) + 4);
}
ctx.textAlign = 'center';
for (let t = Math.ceil(tMin/tStep)*tStep; t <= tMax; t += tStep) {
  ctx.fillText(((t-tMin)/1000).toFixed(0)+'s', tx(t), PAD.top + ch + 16);
}

// axis titles
ctx.save();
ctx.fillStyle = '#555';
ctx.font = '11px monospace';
ctx.translate(14, PAD.top + ch/2);
ctx.rotate(-Math.PI/2);
ctx.textAlign = 'center';
ctx.fillText('km/h', 0, 0);
ctx.restore();
ctx.fillStyle = '#555';
ctx.font = '11px monospace';
ctx.textAlign = 'center';
ctx.fillText('time (s)', PAD.left + cw/2, H - 4);

// fill under curve
ctx.beginPath();
ctx.moveTo(tx(RAW[0].t), ty(0));
for (const d of RAW) ctx.lineTo(tx(d.t), ty(d.speed));
ctx.lineTo(tx(RAW[RAW.length-1].t), ty(0));
ctx.closePath();
const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + ch);
grad.addColorStop(0, 'rgba(79,195,247,0.18)');
grad.addColorStop(1, 'rgba(79,195,247,0.02)');
ctx.fillStyle = grad;
ctx.fill();

// speed line
ctx.beginPath();
ctx.moveTo(tx(RAW[0].t), ty(RAW[0].speed));
for (const d of RAW) ctx.lineTo(tx(d.t), ty(d.speed));
ctx.strokeStyle = '#4fc3f7';
ctx.lineWidth = 1.5;
ctx.lineJoin = 'round';
ctx.stroke();

// max marker
const maxPt = RAW.reduce((a,b) => b.speed > a.speed ? b : a);
const mx = tx(maxPt.t), my = ty(maxPt.speed);
ctx.beginPath();
ctx.arc(mx, my, 4, 0, Math.PI*2);
ctx.fillStyle = '#ff7043';
ctx.fill();
ctx.fillStyle = '#ff7043';
ctx.font = 'bold 11px monospace';
ctx.textAlign = 'left';
ctx.fillText(maxPt.speed.toFixed(2)+' km/h', mx+8, my-4);
